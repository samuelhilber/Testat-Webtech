<main class="feedback">
    <h1>Feedback</h1>
      <p>Werde ich wahrscheinlich nie lesen!<br>Felder mit * sind Pflichtfelder I gues.</p>
      <form method="post">
        <label for="name">Name*:</label>
        <input type="text" id="name" required />
        <br>
        <label for="emailadresse">E-Mail*: Diese wird nicht öffentlich angezeigt, keine Angst!</label>
        <input type="email" id="emailadresse" required />
        <br>
        <label for="title">Titel:</label>
        <input type="text" id="title" />
        <br>
        <label for="message">Inhalt / Erzähl mir was*:</label>
        <textarea id="message" required></textarea>
        <br>
        <div>
          <button type="submit">Absenden</button>
          <button type="reset">Abbrechen</button>
        </div>
      </form>
</main>
